name: timer_rubik
description: "Una aplicación de temporizador para cubo de Rubik con algoritmos OLL/PLL, generador de scrambles y registro de tiempos."
publish_to: 'none'
version: 0.1.0+1
homepage: https://github.com/Tend0Dev/TimerRubik
repository: https://github.com/Tend0Dev/TimerRubik
issue_tracker: https://github.com/Tend0Dev/TimerRubik/issues

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  provider: ^6.0.5
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0


